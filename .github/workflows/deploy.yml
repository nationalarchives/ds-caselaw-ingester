name: Deploy lambda to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to" # This will always deploy to staging because of the set-env job but giving a false option here makes it clear that it won't be going to prod
        required: true
        type: choice
        options:
          - staging
  release:
    types: [published]

permissions: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  terraform:
    needs: set-env
    uses: ./.github/workflows/terraform.yml
    with:
      environment: ${{ needs.set-env.outputs.environment }}
      apply: true
    permissions:
      id-token: write
      contents: read
    secrets:
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
      TF_VAR_TRE_MESSAGE_TOPIC_ARN: ${{ secrets.TF_VAR_TRE_MESSAGE_TOPIC_ARN }}
      TF_VAR_BULK_INGEST_S3_EVENT_TOPIC_ARN: ${{ secrets.TF_VAR_BULK_INGEST_S3_EVENT_TOPIC_ARN }}
      TF_VAR_SLACK_CHANNEL_ID: ${{ secrets.TF_VAR_SLACK_CHANNEL_ID }}
      TF_VAR_LAMBDA_FUNCTION_NAME: ${{ secrets.TF_VAR_LAMBDA_FUNCTION_NAME }}

  build-deploy:
    needs: [set-env, terraform]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-west-2
      - run: sam build --use-container -m requirements/base.txt
      - run: > # zizmor: ignore[template-injection]
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name ds-caselaw-ingester --s3-bucket ${{ vars.SAM_S3_BUCKET }} --capabilities CAPABILITY_IAM --region eu-west-2 --parameter-overrides
          AwsBucketName=${{ vars.PRIVATE_ASSET_BUCKET }}
          EditorialUiBaseUrl=${{ vars.EDITORIAL_UI_BASE_URL }}
          MarklogicHost=${{ secrets.MARKLOGIC_HOST }}
          MarklogicPassword=${{ secrets.MARKLOGIC_PASSWORD }}
          MarklogicUser=${{ secrets.MARKLOGIC_USER }}
          MaxRetries=${{ vars.MAX_RETRIES }}
          NotifyApiKey=${{ secrets.NOTIFY_API_KEY }}
          NotifyEditorialAddress=${{ vars.NOTIFY_EDITORIAL_ADDRESS }}
          NotifyNewJudgmentTemplateId=${{ vars.NOTIFY_NEW_JUDGMENT_TEMPLATE_ID }}
          NotifyUpdatedJudgmentTemplateId=${{ vars.NOTIFY_UPDATED_JUDGMENT_TEMPLATE_ID }}
          PublicAssetBucket=${{ vars.PUBLIC_ASSET_BUCKET }}
          RollbarEnv=${{ vars.ROLLBAR_ENV }}
          RollbarToken=${{ secrets.ROLLBAR_TOKEN }}
          SnsTopic=${{ vars.SNS_TOPIC }}
          IngestQueueArn=${{ needs.terraform.outputs.ingest_queue_arn }}
          VpcSubnetId0=${{ vars.VPC_SUBNET_ID_0 }}
          VpcSubnetId1=${{ vars.VPC_SUBNET_ID_1 }}
          VpcSubnetId2=${{ vars.VPC_SUBNET_ID_2 }}
          VpcSecurityGroupId=${{ vars.VPC_SECURITY_GROUP_ID }}
