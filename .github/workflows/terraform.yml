name: Terraform Plan and Apply

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: string
      apply:
        description: "Run terraform apply after plan"
        required: false
        type: boolean
        default: true
    secrets:
      AWS_OIDC_ROLE_ARN:
        description: "The OIDC role ARN to assume for this environment"
        required: true
      TF_BACKEND_BUCKET:
        description: "S3 bucket for Terraform state"
        required: true
      TF_VAR_TRE_MESSAGE_TOPIC_ARN:
        description: "SNS topic ARN that publishes TRE messages (CourtDocumentPackageAvailable etc.)"
        required: true
      TF_VAR_BULK_INGEST_S3_EVENT_TOPIC_ARN:
        description: "SNS topic ARN that fans out raw S3 ObjectCreated:* event notifications"
        required: true
    outputs:
      ingest_queue_arn:
        description: "ARN of the SQS ingest queue"
        value: ${{ jobs.terraform.outputs.ingest_queue_arn }}
      codeguru_profiling_group_arn:
        description: "ARN of the CodeGuru Profiler profiling group"
        value: ${{ jobs.terraform.outputs.codeguru_profiling_group_arn }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      apply:
        description: "Run terraform apply?"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: eu-west-2
  TERRAFORM_VERSION: 1.9.0
  TF_IN_AUTOMATION: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      ingest_queue_arn: ${{ steps.tf-outputs.outputs.ingest_queue_arn }}
      codeguru_profiling_group_arn: ${{ steps.tf-outputs.outputs.codeguru_profiling_group_arn }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_tre_message_topic_arn: ${{ secrets.TF_VAR_TRE_MESSAGE_TOPIC_ARN }}
      TF_VAR_bulk_ingest_s3_event_topic_arn: ${{ secrets.TF_VAR_BULK_INGEST_S3_EVENT_TOPIC_ARN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: GitHubActions-Terraform-${{ inputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: true

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}"
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: terraform

      - name: Terraform Apply
        if: inputs.apply
        run: terraform apply -auto-approve -input=false
        working-directory: terraform

      - name: Export Terraform Outputs
        if: inputs.apply
        id: tf-outputs
        run: |
          echo "ingest_queue_arn=$(terraform output -raw ingest_queue_arn)" >> "$GITHUB_OUTPUT"
          echo "codeguru_profiling_group_arn=$(terraform output -raw codeguru_profiling_group_arn)" >> "$GITHUB_OUTPUT"
        working-directory: terraform
