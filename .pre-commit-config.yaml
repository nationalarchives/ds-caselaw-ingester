repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-xml
      - id: check-yaml
        exclude: ^template.yml
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: no-commit-to-branch
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-format
      - id: ruff-check
        args:
          - --fix
          - --exit-non-zero-on-fix

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^src/ds_caselaw_ingester/
        language: python
        language_version: "3.13"
        additional_dependencies:
          - types-requests==2.33.0.20260518
          - types-python-dateutil==2.9.0.20260518
          - types-pytz==2026.2.0.20260518
          - types-lxml==2026.2.16
          - boto3-stubs[s3,sns]==1.43.19
          - ds-caselaw-marklogic-api-client==46.1.1
          - ds-caselaw-utils==4.6.0
          - aws-lambda-powertools==3.29.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, json, xml, markdown, scss, javascript]

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.217.1
    hooks:
      - id: renovate-config-validator
        args: [--strict]
        files: ^renovate\.json$

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.106.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
          - --tf-init-args=-backend=false
      - id: terraform_tflint

  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.51.4
    hooks:
      - id: cfn-lint
        files: template.yml
